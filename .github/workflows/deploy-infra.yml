###############################################################################
# Infra CI/CD — Terraform Plan (PR) / Plan or Apply (workflow_dispatch)
#
# PR 트리거:   dev/staging/prod 3환경 병렬 plan → PR 코멘트
# 수동 트리거: 선택한 환경에 plan 또는 apply 실행
#
# 사전 설정:
#   - Repository variable: AWS_ACCOUNT_ID
#   - Environment secrets (dev/staging/prod 각각):
#     DB_USERNAME, DB_PASSWORD, SECRET_KEY
#   - GitHub Environments: dev, staging, prod
#   - Bootstrap에서 OIDC provider + IAM role 생성 완료
###############################################################################

name: Infra — Terraform Plan / Apply

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/deploy-infra.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "대상 환경"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: "실행할 작업"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

###############################################################################
# Job 1: PR — 3환경 병렬 plan (matrix)
###############################################################################
jobs:
  plan-matrix:
    name: Plan / ${{ matrix.environment }}
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    environment: ${{ matrix.environment }}

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    env:
      TF_VERSION: "1.9.8"
      WORKING_DIR: environments/${{ matrix.environment }}
      AWS_REGION: ap-northeast-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/my-community-${{ matrix.environment }}-github-actions
          role-session-name: infra-plan-${{ matrix.environment }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -var-file=terraform.tfvars \
            2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # plan 출력이 GitHub 코멘트 길이 제한(65536자)을 초과하지 않도록 자름
      # 랜덤 delimiter 사용: plan 출력에 delimiter 문자열이 포함될 경우 injection 방지
      - name: Truncate plan output
        id: truncate
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          PLAN_TEXT=$(tail -c 60000 plan_output.txt)
          DELIMITER="ghadelimiter_$(openssl rand -hex 8)"
          {
            echo "plan_output<<${DELIMITER}"
            echo "$PLAN_TEXT"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      # PR에 환경별 plan 결과 코멘트 (기존 코멘트 업데이트로 누적 방지)
      - name: Post Plan Comment
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.truncate.outputs.plan_output }}
          PLAN_EXITCODE: ${{ steps.plan.outputs.exitcode }}
          TF_ENV: ${{ matrix.environment }}
        with:
          script: |
            const env = process.env.TF_ENV;
            const exitcode = process.env.PLAN_EXITCODE;
            const planOut = process.env.PLAN_OUTPUT;

            const statusEmoji = exitcode === '0' ? '✅' : exitcode === '2' ? '⚠️' : '❌';
            const statusText = exitcode === '0' ? '변경 없음'
                             : exitcode === '2' ? '변경 있음'
                             : '오류 발생';

            const marker = `<!-- terraform-plan-${env} -->`;
            const body = [
              marker,
              `## Terraform Plan — \`${env}\` ${statusEmoji}`,
              `**상태**: ${statusText} (exit code: ${exitcode})`,
              '',
              '<details>',
              `<summary>plan 출력 펼치기</summary>`,
              '',
              '```hcl',
              planOut,
              '```',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  ###############################################################################
  # Job 2: workflow_dispatch — 선택 환경에 plan 또는 apply
  ###############################################################################
  dispatch:
    name: ${{ inputs.action }} / ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      TF_VERSION: "1.9.8"
      WORKING_DIR: environments/${{ inputs.environment }}
      AWS_REGION: ap-northeast-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/my-community-${{ inputs.environment }}-github-actions
          role-session-name: infra-${{ inputs.action }}-${{ inputs.environment }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      # plan 결과를 파일에 저장 → apply 시 정확히 같은 plan 적용
      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
        run: |
          terraform plan \
            -input=false \
            -var-file=terraform.tfvars \
            -out=tfplan.bin

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan.bin
