apiVersion: v1
kind: ConfigMap
metadata:
  name: community-config
  namespace: app
data:
  DB_HOST: "mysql.data.svc.cluster.local"
  DB_PORT: "3306"
  DB_USER: "manager_dev"
  DB_NAME: "community_service"
  REDIS_URL: "redis://redis-master.data.svc.cluster.local:6379"
  RATE_LIMIT_BACKEND: "redis"
  WS_BACKEND: "redis"
  ALLOWED_ORIGINS: '["https://my-community.shop", "https://k8s.my-community.shop"]'
  TRUSTED_PROXIES: '["10.0.1.160", "10.0.1.23", "10.0.1.12"]'
  EMAIL_BACKEND: "smtp"
  EMAIL_FROM: "noreply@my-community.shop"
  SMTP_HOST: "email-smtp.ap-northeast-2.amazonaws.com"
  SMTP_PORT: "587"
  # SMTP_USER, SMTP_PASSWORD: community-secrets에서 주입
  STORAGE_BACKEND: "s3"
  S3_UPLOADS_BUCKET: "my-community-dev-uploads"
  S3_UPLOADS_PREFIX: "uploads"
  S3_REGION: "ap-northeast-2"
  UPLOAD_DIR: "/uploads"
  TESTING: "true"
  DEBUG: "true"
