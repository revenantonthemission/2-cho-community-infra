apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-ws
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: community-ws
  template:
    metadata:
      labels:
        app: community-ws
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: community-ws
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: community-ws
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ecr-cred
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: community-ws
          image: community-backend:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command: ["uvicorn", "ws_app:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: community-config
            - secretRef:
                name: community-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
          # 롤링 배포 시 기존 WebSocket 연결 graceful drain
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
