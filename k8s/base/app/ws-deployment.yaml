apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-ws
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: community-ws
  template:
    metadata:
      labels:
        app: community-ws
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: community-ws
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: community-ws
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ecr-cred
      containers:
        - name: community-ws
          image: community-backend:latest
          command: ["uv", "run", "uvicorn", "ws_app:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: community-config
            - secretRef:
                name: community-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
