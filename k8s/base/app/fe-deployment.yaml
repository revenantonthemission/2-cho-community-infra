apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-fe
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: community-fe
  template:
    metadata:
      labels:
        app: community-fe
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: community-fe
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: community-fe
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ecr-cred
      containers:
        - name: community-fe
          image: community-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 15
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
