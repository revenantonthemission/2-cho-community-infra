# ECR 토큰 자동 갱신 CronJob
# AWS ECR 인증 토큰은 12시간 후 만료 → 10시간마다 갱신
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresh-sa
  namespace: app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresh-role
  namespace: app
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresh-binding
  namespace: app
subjects:
  - kind: ServiceAccount
    name: ecr-refresh-sa
    namespace: app
roleRef:
  kind: Role
  name: ecr-refresh-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-cred-refresh
  namespace: app
spec:
  schedule: "0 */10 * * *"  # 10시간마다 실행
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: ecr-refresh-sa
          restartPolicy: OnFailure
          containers:
            - name: ecr-refresh
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  ACCOUNT=559352512800
                  REGION=ap-northeast-2
                  ECR_SERVER="${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com"

                  # ECR 토큰 획득 (노드 IAM 역할 사용)
                  TOKEN=$(aws ecr get-login-password --region ${REGION})

                  # kubectl 설치 (경량)
                  curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  chmod +x kubectl
                  mv kubectl /usr/local/bin/

                  # 기존 Secret 삭제 + 새 Secret 생성
                  kubectl delete secret ecr-cred -n app --ignore-not-found
                  kubectl create secret docker-registry ecr-cred -n app \
                    --docker-server=${ECR_SERVER} \
                    --docker-username=AWS \
                    --docker-password="${TOKEN}"

                  echo "ECR credential refreshed at $(date)"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
