apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-api
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: community-api
  template:
    metadata:
      labels:
        app: community-api
    spec:
      # AZ 간 균등 분배: 한쪽 AZ 장애 시에도 서비스 유지
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: community-api
      # 같은 노드에 API Pod 집중 방지
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: community-api
                topologyKey: kubernetes.io/hostname
      serviceAccountName: community-api
      imagePullSecrets:
        - name: ecr-cred
      containers:
        - name: community-api
          image: community-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: community-config
            - secretRef:
                name: community-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
