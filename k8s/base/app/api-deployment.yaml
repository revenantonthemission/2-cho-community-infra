apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-api
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: community-api
  template:
    metadata:
      labels:
        app: community-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # AZ 간 균등 분배: 한쪽 AZ 장애 시에도 서비스 유지
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: community-api
      # 같은 노드에 API Pod 집중 방지
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: community-api
                topologyKey: kubernetes.io/hostname
      serviceAccountName: community-api
      imagePullSecrets:
        - name: ecr-cred
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: community-api
          image: community-backend:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: community-config
            - secretRef:
                name: community-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /livez
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            periodSeconds: 10
          # 롤링 배포 시 in-flight 요청 완료 대기
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
