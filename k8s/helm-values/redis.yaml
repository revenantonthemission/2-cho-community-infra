architecture: standalone
auth:
  enabled: false
master:
  persistence:
    size: 2Gi
    storageClassName: local-storage
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
