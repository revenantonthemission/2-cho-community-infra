# ArgoCD RBAC 정책 — GitHub 사용자명 직접 매핑
# 개인 계정 구조: org 팀 매핑 대신 사용자명으로 역할 할당
# Dex GitHub 커넥터가 GitHub username을 subject로 전달
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  # preferred_username을 RBAC 매칭에 사용 (개인 계정은 groups가 비어있음)
  scopes: "[email, groups, preferred_username]"
  policy.default: ""
  policy.csv: |
    # === GitHub 사용자 매핑 ===
    g, revenantonthemission, role:admin

    # === 역할 정의 ===
    # admin: 모든 리소스에 대한 전체 권한
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow
    p, role:admin, logs, get, */*, allow

    # readonly: 모든 Application 읽기 + 로그 조회
    p, role:readonly, applications, get, */*, allow
    p, role:readonly, logs, get, */*, allow
