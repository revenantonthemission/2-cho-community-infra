# ArgoCD AppProject — 개발 환경
# auto-sync 활성화, 배포 윈도우 제한 없음
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Camp Linux 개발 환경 — auto-sync 활성화"

  sourceRepos:
    - "https://github.com/80-hours-a-week/2-cho-community-infra.git"
    - "https://github.com/revenantonthemission/2-cho-community-infra.git"

  # app/data 네임스페이스 + 클러스터 범위 리소스 허용
  destinations:
    - namespace: app
      server: https://kubernetes.default.svc
    - namespace: data
      server: https://kubernetes.default.svc
    - namespace: ""
      server: https://kubernetes.default.svc

  # 네임스페이스 범위 리소스 전체 허용
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # Kustomize overlay가 포함하는 클러스터 범위 리소스 허용
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: ""
      kind: PersistentVolume
    - group: storage.k8s.io
      kind: StorageClass
    - group: cert-manager.io
      kind: ClusterIssuer

  # 고아 리소스 경고
  orphanedResources:
    warn: true

  roles:
    - name: dev-deployer
      description: "CI/CD 봇 — 이미지 태그 커밋 후 sync"
      policies:
        - p, proj:dev:dev-deployer, applications, sync, dev/*, allow
        - p, proj:dev:dev-deployer, applications, get, dev/*, allow
    - name: dev-viewer
      description: "개발팀 읽기 전용"
      policies:
        - p, proj:dev:dev-viewer, applications, get, dev/*, allow
