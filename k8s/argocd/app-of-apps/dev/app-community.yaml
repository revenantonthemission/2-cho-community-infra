# ArgoCD Application — Camp Linux 개발 환경 전체
# k8s/overlays/dev/ Kustomize overlay를 소유하며 auto-sync 활성화
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: community-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    env: dev
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.github: ""
    notifications.argoproj.io/subscribe.on-sync-failed.github: ""
    notifications.argoproj.io/subscribe.on-health-degraded.github: ""
spec:
  project: dev

  source:
    repoURL: https://github.com/80-hours-a-week/2-cho-community-infra.git
    targetRevision: main
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: app

  syncPolicy:
    automated:
      # git 커밋 시 자동 반영
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # ArgoCD가 관리하지 않는 동적 리소스 diff 무시
  ignoreDifferences:
    # ecr-cred-refresh CronJob이 10시간마다 갱신하는 Secret
    - group: ""
      kind: Secret
      name: ecr-cred
      jsonPointers:
        - /data
    # 수동 관리 Secret (DB 비밀번호, SECRET_KEY 등)
    - group: ""
      kind: Secret
      name: community-secrets
      jsonPointers:
        - /data
