# MySQL 백업 CronJob — 매일 03:00 UTC에 mysqldump → S3 업로드
# S3 경로: s3://my-community-dev-uploads/backups/mysql/
# 보존 정책: 7일 이전 백업 자동 삭제
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: data
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: mysql-backup
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # AL2023: mariadb105(mysqldump) + gzip(압축)
                  yum install -y mariadb105 gzip 2>/dev/null

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/tmp/community_service_${TIMESTAMP}.sql.gz"
                  S3_BUCKET="my-community-dev-uploads"
                  S3_PREFIX="backups/mysql"

                  echo "=== MySQL 백업 시작: ${TIMESTAMP} ==="

                  # mysqldump 실행 + gzip 압축
                  mysqldump -h mysql.data.svc.cluster.local \
                    -u root -p"${MYSQL_ROOT_PASSWORD}" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    community_service | gzip > "${BACKUP_FILE}"

                  FILESIZE=$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || stat -f%z "${BACKUP_FILE}")
                  echo "백업 파일 크기: ${FILESIZE} bytes"

                  # S3 업로드
                  aws s3 cp "${BACKUP_FILE}" "s3://${S3_BUCKET}/${S3_PREFIX}/community_service_${TIMESTAMP}.sql.gz"
                  echo "S3 업로드 완료: s3://${S3_BUCKET}/${S3_PREFIX}/community_service_${TIMESTAMP}.sql.gz"

                  # 7일 이전 백업 삭제
                  CUTOFF=$(date -d '7 days ago' +%Y%m%d 2>/dev/null || date -v-7d +%Y%m%d)
                  aws s3 ls "s3://${S3_BUCKET}/${S3_PREFIX}/" | while read -r line; do
                    FILE=$(echo "$line" | awk '{print $4}')
                    FILE_DATE=$(echo "$FILE" | grep -oP '\d{8}' | head -1)
                    if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF" ] 2>/dev/null; then
                      echo "오래된 백업 삭제: ${FILE}"
                      aws s3 rm "s3://${S3_BUCKET}/${S3_PREFIX}/${FILE}"
                    fi
                  done

                  echo "=== MySQL 백업 완료 ==="
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-secret
                      key: MYSQL_ROOT_PASSWORD
                - name: AWS_DEFAULT_REGION
                  value: "ap-northeast-2"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
